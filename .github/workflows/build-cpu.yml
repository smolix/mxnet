name: build-cpu

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-cpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: CPU build (oneDNN, no CUDA)
    runs-on: ubuntu-latest
    # Job-level: build step cap (120) + ~20 (setup, smoke-test, artefact
    # upload, cache save). Generous headroom so the *first* cold build in a
    # ref scope completes and seeds the ccache/build-dir caches — once seeded,
    # warm builds finish in ~5 min. Step-level cap is set on the build below.
    timeout-minutes: 150
    env:
      CMAKE_BUILD_DIR: build
      CMAKE_BUILD_TYPE: Release
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # 5G: the full CPU object set is well over 2G, so a 2G cap evicted
      # objects *within* a single cold build (cache thrash) and left warm
      # builds with avoidable misses. 5G holds the whole build comfortably.
      CCACHE_MAXSIZE: "5G"
      VENV_DIR: ${{ github.workspace }}/.venv
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -o Acquire::Retries=3
          # CPU-only build: openblas + opencv + ninja + ccache. NCCL is GPU-only, skip.
          # gfortran provides libgfortran.so (libmxnet links it via OpenBLAS/LAPACK);
          # the runner image no longer ships the unversioned .so by default, so the
          # final link fails on a missing libgfortran.so without it.
          # Retries + per-connection timeout so a slow mirror fails fast and retries.
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=25 -o Acquire::https::Timeout=25 \
            build-essential \
            ninja-build \
            cmake \
            ccache \
            g++ \
            gfortran \
            libopenblas-dev \
            libopencv-dev \
            libomp-dev \
            python3 \
            python3-pip \
            python3-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          # Image-scoped (ubuntu24): the cmake build dir bakes the absolute compiler
          # path (e.g. .../gcc/x86_64-linux-gnu/13/libgfortran.so), so a cache seeded
          # on a different gcc major (22.04/gcc-11) must NOT be restored here — doing
          # so reintroduces the "missing libgfortran.so" link failure. Bump this
          # token if the runner image's gcc major changes.
          key: ccache-build-cpu-ubuntu24-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-build-cpu-ubuntu24-${{ github.ref }}-
            ccache-build-cpu-ubuntu24-

      - name: Cache CMake build dir
        uses: actions/cache@v5
        with:
          path: ${{ env.CMAKE_BUILD_DIR }}
          key: cmake-build-cpu-ubuntu24-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            cmake-build-cpu-ubuntu24-${{ github.ref }}-
            cmake-build-cpu-ubuntu24-

      - name: Configure CMake
        run: |
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUSE_CUDA=OFF \
            -DUSE_CUDNN=OFF \
            -DUSE_NCCL=OFF \
            -DUSE_ONEDNN=ON \
            -DUSE_OPENMP=ON \
            -DUSE_OPERATOR_TUNING=OFF \
            -DUSE_OPENCV=ON \
            -DUSE_BLAS=open \
            -DUSE_DIST_KVSTORE=OFF \
            -DBUILD_CPP_EXAMPLES=OFF

      - name: Build (ninja mxnet)
        # Standard ubuntu-latest GitHub-hosted runners are 4 vCPU / 16 GB
        # (the old "7 GB" comment was stale, which is why this was pinned
        # to -j2). Each mxnet cc1plus peaks ~1.5 GB RSS in the heavy-template
        # files (operator_tune.cc, np_moments_op.cc, etc.), so -j4 peaks
        # ~6 GB — comfortably within 16 GB and no swapping. -j4 ~halves the
        # cold wall-time (was timing out >90 min at -j2), which lets the
        # first cold build in a ref scope finish and seed the cache. The
        # 120-min cap is headroom for that one-time cold seed; warm ccache
        # builds finish in ~5 min.
        timeout-minutes: 120
        run: cmake --build "$CMAKE_BUILD_DIR" --target mxnet -- -j 4

      - name: ccache stats
        if: always()
        run: ccache -s || true

      - name: Locate libmxnet.so
        id: locate
        run: |
          set -e
          libpath=$(find "$CMAKE_BUILD_DIR" -maxdepth 3 -name 'libmxnet.so' | head -n1)
          if [ -z "$libpath" ]; then
            echo "libmxnet.so not produced" >&2
            exit 1
          fi
          echo "libpath=$libpath" >> "$GITHUB_OUTPUT"
          ls -lh "$libpath"

      - name: Smoke test (import mxnet)
        env:
          MXNET_LIBRARY_PATH: ${{ github.workspace }}/${{ steps.locate.outputs.libpath }}
          MXNET_SETUP_ENABLE_CUDA_DEPS: "0"
        run: |
          uv venv "$VENV_DIR" --python 3.11
          # Install runtime deps used by python/mxnet (keep minimal).
          uv pip install --python "$VENV_DIR/bin/python" "numpy<2" requests
          # Install the in-tree python package in editable mode, pointing at the freshly built .so.
          cd python
          uv pip install --python "$VENV_DIR/bin/python" -e .
          cd ..
          "$VENV_DIR/bin/python" -c "import mxnet; import mxnet.numpy as np; x = np.array([1,2,3]); print(x*2)"

      - name: Upload libmxnet.so artefact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: libmxnet-cpu-${{ github.sha }}
          path: ${{ steps.locate.outputs.libpath }}
          if-no-files-found: warn
          retention-days: 14

  # Validate links/cross-references in the MODERN docs/api reference (the site we
  # actually publish). This REUSES the libmxnet.so the build job just compiled —
  # downloaded as an artifact within this same run — so libmxnet is built ONCE on
  # Linux. It replaces the old standalone link_check.yml, which recompiled libmxnet
  # a second time on a legacy py3.9 / sphinx-2.4 stack against docs/python_docs (a
  # tree we don't publish). Same-run artifact reuse keeps PR coverage (no
  # workflow_run), and a failure here is independent of the build/test signal.
  linkcheck:
    name: docs/api linkcheck (py3.12)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false   # docs/api + the python package only; no 3rdparty

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # The build artifact is the full libmxnet.so (USE_OPENCV=ON), so the OpenCV
      # runtime must be present for `import mxnet` to dlopen it.
      - name: Install OpenCV runtime (only the libs libmxnet links)
        run: |
          # libmxnet.so links ONLY libopencv_{core,imgproc,imgcodecs}.so.* (verified
          # from its ELF NEEDED entries). Install just those runtime libs -- NOT the
          # libopencv-dev metapackage, which pulls every OpenCV module plus ROCm/GDAL/
          # ffmpeg deps that `import mxnet` never loads (hundreds of MB, and the cause
          # of the 30-min apt hang when the mirror is slow). Resolve the versioned
          # package names from the apt index so this survives OpenCV SONAME bumps on
          # the runner image; fall back to libopencv-dev if resolution finds nothing.
          # Retries + per-connection timeout so a stalled mirror fails fast and retries
          # instead of hanging to the job timeout.
          sudo apt-get update -o Acquire::Retries=3
          pkgs=$(for m in core imgproc imgcodecs; do
                   apt-cache --names-only search "^libopencv-${m}[0-9]"
                 done | awk '{print $1}' | sort -u)
          if [ -z "$pkgs" ]; then
            echo "::warning::lean OpenCV runtime packages not found; falling back to libopencv-dev"
            pkgs=libopencv-dev
          fi
          echo "Installing OpenCV runtime: $pkgs"
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=25 -o Acquire::https::Timeout=25 \
            $pkgs

      - name: Download libmxnet.so (built by the build job, same run)
        uses: actions/download-artifact@v8
        with:
          name: libmxnet-cpu-${{ github.sha }}
          path: ${{ github.workspace }}/lib

      - name: Locate libmxnet.so
        id: locate
        run: |
          set -e
          libpath=$(find "$GITHUB_WORKSPACE/lib" -name 'libmxnet.so' | head -n1)
          if [ -z "$libpath" ]; then echo "libmxnet.so not found in artifact" >&2; exit 1; fi
          echo "libpath=$libpath" >> "$GITHUB_OUTPUT"

      - name: Install mxnet (editable) + docs/api toolchain
        env:
          MXNET_LIBRARY_PATH: ${{ steps.locate.outputs.libpath }}
          MXNET_SETUP_ENABLE_CUDA_DEPS: "0"
        run: |
          # setuptools+wheel: mxnet's PEP 517 backend; py3.12 no longer bundles
          # setuptools, and --no-build-isolation needs it present.
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy<2" requests "graphviz>=0.8.1,<0.9.0" "packaging>=20.0"
          python -m pip install --no-build-isolation -e ./python
          python -m pip install -r docs/api/requirements.txt
          python -c "import mxnet; print('mxnet', mxnet.__version__)"

      - name: Link Check (docs/api)
        env:
          MXNET_LIBRARY_PATH: ${{ steps.locate.outputs.libpath }}
        run: |
          # Report broken links but do NOT gate CI on them. The API docstrings (and
          # the NumPy ones they re-expose) reference dozens of external pages — the
          # Array API spec, academic PDFs, OpenCV/SciPy docs — that move, 404, or
          # 402/403 CI bots over time. That rot is outside our control and is exactly
          # what the legacy linkcheck stopped gating on; the full report stays in the
          # log so a maintainer can fix any genuinely-controllable links.
          make -C docs/api clean
          timeout 10m make -C docs/api linkcheck \
            || echo "::warning title=docs/api linkcheck::broken/redirected links reported above (external link rot — not gating CI)"
