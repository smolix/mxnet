name: build-cpu

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-cpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: CPU build (oneDNN, no CUDA)
    runs-on: ubuntu-latest
    # Job-level: build step cap (120) + ~20 (setup, smoke-test, artefact
    # upload, cache save). Generous headroom so the *first* cold build in a
    # ref scope completes and seeds the ccache/build-dir caches — once seeded,
    # warm builds finish in ~5 min. Step-level cap is set on the build below.
    timeout-minutes: 150
    env:
      CMAKE_BUILD_DIR: build
      CMAKE_BUILD_TYPE: Release
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # 5G: the full CPU object set is well over 2G, so a 2G cap evicted
      # objects *within* a single cold build (cache thrash) and left warm
      # builds with avoidable misses. 5G holds the whole build comfortably.
      CCACHE_MAXSIZE: "5G"
      VENV_DIR: ${{ github.workspace }}/.venv
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # CPU-only build: openblas + opencv + ninja + ccache. NCCL is GPU-only, skip.
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            cmake \
            ccache \
            g++ \
            libopenblas-dev \
            libopencv-dev \
            libomp-dev \
            python3 \
            python3-pip \
            python3-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-build-cpu-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-build-cpu-${{ github.ref }}-
            ccache-build-cpu-

      - name: Cache CMake build dir
        uses: actions/cache@v4
        with:
          path: ${{ env.CMAKE_BUILD_DIR }}
          key: cmake-build-cpu-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            cmake-build-cpu-${{ github.ref }}-
            cmake-build-cpu-

      - name: Configure CMake
        run: |
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUSE_CUDA=OFF \
            -DUSE_CUDNN=OFF \
            -DUSE_NCCL=OFF \
            -DUSE_ONEDNN=ON \
            -DUSE_OPENMP=ON \
            -DUSE_OPERATOR_TUNING=OFF \
            -DUSE_OPENCV=ON \
            -DUSE_BLAS=open \
            -DUSE_DIST_KVSTORE=OFF \
            -DBUILD_CPP_EXAMPLES=OFF

      - name: Build (ninja mxnet)
        # Standard ubuntu-latest GitHub-hosted runners are 4 vCPU / 16 GB
        # (the old "7 GB" comment was stale, which is why this was pinned
        # to -j2). Each mxnet cc1plus peaks ~1.5 GB RSS in the heavy-template
        # files (operator_tune.cc, np_moments_op.cc, etc.), so -j4 peaks
        # ~6 GB — comfortably within 16 GB and no swapping. -j4 ~halves the
        # cold wall-time (was timing out >90 min at -j2), which lets the
        # first cold build in a ref scope finish and seed the cache. The
        # 120-min cap is headroom for that one-time cold seed; warm ccache
        # builds finish in ~5 min.
        timeout-minutes: 120
        run: cmake --build "$CMAKE_BUILD_DIR" --target mxnet -- -j 4

      - name: ccache stats
        if: always()
        run: ccache -s || true

      - name: Locate libmxnet.so
        id: locate
        run: |
          set -e
          libpath=$(find "$CMAKE_BUILD_DIR" -maxdepth 3 -name 'libmxnet.so' | head -n1)
          if [ -z "$libpath" ]; then
            echo "libmxnet.so not produced" >&2
            exit 1
          fi
          echo "libpath=$libpath" >> "$GITHUB_OUTPUT"
          ls -lh "$libpath"

      - name: Smoke test (import mxnet)
        env:
          MXNET_LIBRARY_PATH: ${{ github.workspace }}/${{ steps.locate.outputs.libpath }}
          MXNET_SETUP_ENABLE_CUDA_DEPS: "0"
        run: |
          uv venv "$VENV_DIR" --python 3.11
          # Install runtime deps used by python/mxnet (keep minimal).
          uv pip install --python "$VENV_DIR/bin/python" "numpy<2" requests
          # Install the in-tree python package in editable mode, pointing at the freshly built .so.
          cd python
          uv pip install --python "$VENV_DIR/bin/python" -e .
          cd ..
          "$VENV_DIR/bin/python" -c "import mxnet; import mxnet.numpy as np; x = np.array([1,2,3]); print(x*2)"

      - name: Upload libmxnet.so artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: libmxnet-cpu-${{ github.sha }}
          path: ${{ steps.locate.outputs.libpath }}
          if-no-files-found: warn
          retention-days: 14
