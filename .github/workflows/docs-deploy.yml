# Build the docs/api Sphinx reference and publish it to GitHub Pages
# (https://smolix.github.io/mxnet/).
#
# Background: the site is the modern `docs/api` reference (sphinx>=7 + furo).  It
# used to be published only by hand — `make -C docs/api deploy`, which force-pushes
# the built HTML to a `gh-pages` branch (docs/api/deploy.sh).  That is a manual,
# one-off publish, so whenever the gh-pages branch / Pages config was lost the site
# 404'd ("down again").  This workflow makes the publish automatic and idempotent:
# every push to master rebuilds and deploys via the GitHub Pages "Actions" source,
# so the site stays up without anyone running deploy.sh.
#
# conf.py does `import mxnet` (autodoc/autosummary document the *installed*
# package), so the job must build a libmxnet that imports.  We build a minimal
# CPU-only libmxnet (no CUDA/oneDNN/OpenCV/OpenMP) — autodoc only needs the module
# to import, not a full-featured runtime — mirroring the proven build in
# link_check.yml.  Pages must be enabled with the "GitHub Actions" source
# (Settings -> Pages, or `gh api -X POST repos/smolix/mxnet/pages -f build_type=workflow`).
name: docs deploy (GitHub Pages)

on:
  push:
    branches: [master]
  workflow_dispatch:

# Least-privilege token plus the Pages/OIDC scopes deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; let a newer master push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-pages-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-pages-ccache

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache \
              libopenblas-dev liblapack-dev
          ccache -M 500M

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # docs/api uses a modern toolchain (sphinx>=7, furo); 3.12 installs it
          # cleanly and mxnet itself builds/imports on 3.12 (no python_requires).
          python-version: '3.12'

      - name: Build libmxnet (CPU-only; just needs to import for autodoc)
        run: |
          mkdir -p build && cd build
          # USE_WERROR=OFF: gcc-11 on 22.04 raises false-positive -Wmaybe-uninitialized
          # in vendored mshadow; this is a docs-only import build, not a release build.
          # Route compiles through ccache so the ~/.ccache cache action actually
          # speeds up subsequent runs (without the launchers cmake never invokes
          # ccache and every run is a cold full build).
          CXXFLAGS="-Wno-error=strict-overflow" cmake -G Ninja \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DUSE_WERROR=OFF \
              -DUSE_CUDA=OFF -DUSE_CUDNN=OFF -DUSE_NCCL=OFF \
              -DUSE_ONEDNN=OFF -DUSE_OPENCV=OFF -DUSE_OPENMP=OFF \
              -DUSE_BLAS=open -DUSE_LAPACK=ON \
              ..
          ninja mxnet
          ccache -s | grep -iE 'hits|misses' || true

      - name: Install mxnet (editable) + docs toolchain
        run: |
          # setuptools+wheel are mxnet's PEP 517 build backend; with
          # --no-build-isolation they must already be present in the env, and
          # Python 3.12 + modern pip no longer bundle setuptools — without this the
          # editable install dies with "Cannot import 'setuptools.build_meta'".
          python -m pip install --upgrade pip setuptools wheel
          # mxnet runtime deps needed at import + setup.py autocomplete time.
          python -m pip install "numpy<2" requests "graphviz>=0.8.1,<0.9.0" "packaging>=20.0"
          # Build against the populated env (setup.py's autocomplete imports the
          # just-built mxnet, which needs numpy); build isolation would hide it.
          MXNET_SETUP_ENABLE_CUDA_DEPS=0 python -m pip install --no-build-isolation -e ./python
          python -m pip install -r docs/api/requirements.txt

      - name: Build the API reference (docs/api -> _build/html)
        env:
          MXNET_LIBRARY_PATH: ${{ github.workspace }}/build/libmxnet.so
        run: |
          make -C docs/api html
          test -f docs/api/_build/html/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
