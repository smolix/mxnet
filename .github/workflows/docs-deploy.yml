# Build the docs/api Sphinx reference and publish it to GitHub Pages
# (https://smolix.github.io/mxnet/).
#
# Background: the site is the modern `docs/api` reference (sphinx>=7 + furo).  It
# used to be published only by hand — `make -C docs/api deploy`, which force-pushes
# the built HTML to a `gh-pages` branch (docs/api/deploy.sh).  That is a manual,
# one-off publish, so whenever the gh-pages branch / Pages config was lost the site
# 404'd ("down again").  This workflow makes the publish automatic and idempotent:
# every push to master rebuilds and deploys via the GitHub Pages "Actions" source,
# so the site stays up without anyone running deploy.sh.
#
# conf.py does `import mxnet` (autodoc/autosummary document the *installed*
# package), so mxnet must be importable.  This workflow used to COMPILE libmxnet
# from source just to import it — duplicating the libmxnet build that link_check.yml
# also runs.  Instead we install the most recent published `+cpu.linux` wheel from
# the GitHub Releases: it is built for cp312 (matching the py3.12 docs toolchain)
# and bundles most native deps, so it installs + imports in seconds with no source
# build and no submodules (it does need the OpenCV runtime via apt — the wheel's
# bundled OpenCV has a few unbundled system deps).  The reference therefore
# documents the last released wheel's surface — for a published, pip-installable API
# reference that is exactly what should be documented.  (link_check.yml still builds
# libmxnet because its legacy py3.9 toolchain has no installable wheel; see that
# file.)
#
# Pages must be enabled with the "GitHub Actions" source (Settings -> Pages, or
# `gh api -X POST repos/smolix/mxnet/pages -f build_type=workflow`).
name: docs deploy (GitHub Pages)

on:
  # Trigger only on changes to the docs sources/toolchain or this workflow, plus
  # manual dispatch. All of these run on master, which is what the github-pages
  # environment allows to deploy. Plain code-only master commits leave the
  # published wheel (and thus the rendered docs) identical, so rebuilding on every
  # push was ~10-15 min of wasted runner time each (apt + Sphinx + linkcheck).
  #
  # NOTE: do NOT add a `release: published` trigger here. That run executes on the
  # TAG ref, and the github-pages environment is locked to the default branch, so
  # the deploy job is rejected ("Tag ... is not allowed to deploy to github-pages
  # due to environment protection rules") and the run goes red on every release.
  # To refresh the docs after a release, run this workflow via workflow_dispatch
  # (it dispatches on master and deploys cleanly).
  push:
    branches: [master]
    paths:
      - 'docs/api/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

# Least-privilege token plus the Pages/OIDC scopes deploy-pages needs.  `contents:
# read` also lets `gh` download the release wheel.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; let a newer master push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        # No native build here, so the 3rd-party submodules are not needed.
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # docs/api uses a modern toolchain (sphinx>=7, furo); 3.12 installs it
          # cleanly and matches the cp312 published wheel installed below.
          python-version: '3.12'

      - name: Install mxnet (published CPU wheel) + docs toolchain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # Install the newest published cp312 Linux CPU wheel. Scanning several
          # releases keeps this working even if the very latest release happened not
          # to attach a +cpu.linux wheel.
          wheeldir="$(mktemp -d)"
          wheel=""
          for tag in $(gh release list --limit 20 --json tagName --jq '.[].tagName'); do
            if gh release download "$tag" --dir "$wheeldir" \
                 --pattern '*cpu.linux*cp312-cp312-linux_x86_64.whl' 2>/dev/null; then
              wheel="$(ls "$wheeldir"/*.whl | head -n1)"
              echo "Using $(basename "$wheel") (from release $tag)"
              break
            fi
          done
          if [ -z "$wheel" ]; then
            echo "No published +cpu.linux cp312 wheel found in the last 20 releases" >&2
            exit 1
          fi
          # The wheel bundles OpenCV but not all of OpenCV's transitive *system* deps
          # (e.g. libcharls.so.2), so `import mxnet` needs the OpenCV runtime present.
          # Install only the runtime libs libmxnet links (core/imgproc/imgcodecs), not
          # the full libopencv-dev metapackage (every module + ROCm/GDAL/ffmpeg deps).
          # Resolve versioned names from the apt index; fall back to libopencv-dev.
          sudo apt-get update -o Acquire::Retries=3
          opencv_pkgs=$(for m in core imgproc imgcodecs; do
                          apt-cache --names-only search "^libopencv-${m}[0-9]"
                        done | awk '{print $1}' | sort -u)
          if [ -z "$opencv_pkgs" ]; then
            echo "::warning::lean OpenCV runtime packages not found; falling back to libopencv-dev"
            opencv_pkgs=libopencv-dev
          fi
          echo "Installing OpenCV runtime: $opencv_pkgs"
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=25 -o Acquire::https::Timeout=25 \
            $opencv_pkgs
          python -m pip install "$wheel"
          python -m pip install -r docs/api/requirements.txt
          python -c "import mxnet; print('mxnet', mxnet.__version__)"

      - name: Build the API reference (docs/api -> _build/html)
        run: |
          make -C docs/api html
          test -f docs/api/_build/html/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/api/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
