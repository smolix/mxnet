name: link check

# Branch-filter the push trigger: a same-repo PR otherwise fires BOTH `push` (to
# the PR branch) and `pull_request`, running the libmxnet build twice. Now push
# only triggers on master; PRs are covered by the pull_request event.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs (e.g. rapid pushes to a PR) so full builds don't pile up.
concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  linkcheck:
    # ubuntu-20.04 was retired by GitHub-hosted runners (2025); this job runs on
    # ubuntu-latest. That dropped the old gcc-7 toolchain and EOL Python 3.8 — the
    # legacy docs stack now pins Python 3.9 explicitly below (runner-independent).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # We include the commit sha in the cache key, as new cache entries are
          # only created if there is no existing entry for the key yet.
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          # Restore any ccache cache entry, if none for
          # ${{ runner.os }}-ccache-${{ github.sha }} exists
          restore-keys: |
            ${{ runner.os }}-ccache

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          # The docs toolchain in docs/python_docs/requirements is a legacy, tightly
          # pinned set (numpy<1.20, sphinx==2.4.0, nbsphinx==0.4.3, ...) that only has
          # wheels for Python <=3.9 — on 3.10+ pip falls back to building numpy 1.19
          # from source, which fails (the _Py_HashDouble signature changed in 3.10).
          # 3.9 is the newest interpreter these pins install cleanly on; mxnet itself
          # has no python_requires, so it installs here too. (Modernizing the whole
          # docs stack to a current sphinx is a separate, larger effort.)
          python-version: '3.9'
          architecture: x64

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev ninja-build ccache python3-sphinx \
              pandoc libopencv-dev protobuf-compiler libprotobuf-dev
          ccache -M 500M  # Limit the ccache size; Github's overall cache limit is 5GB
          python -m pip install pandoc-attributes==0.1.7
          python -m pip install -r docs/python_docs/requirements
          # mx-theme's setup.py imports sphinx at module load (mxtheme/card.py), but
          # modern pip's build isolation runs it in a fresh env without sphinx
          # ("ModuleNotFoundError: No module named 'sphinx'"). Build it against the env
          # we just populated (sphinx is installed above) instead of an isolated one.
          python -m pip install --no-build-isolation docs/python_docs/themes/mx-theme
        shell: bash

      - name: Build project
        run: |
          git submodule update --init --recursive
          mkdir build; cd build
          # The docs build only needs libmxnet to import for autodoc, not a warning-clean
          # release build. ubuntu-22.04's gcc-11 (after this job dropped the retired
          # gcc-7) is stricter and raises false-positive warnings in vendored mshadow
          # (e.g. -Wmaybe-uninitialized in Shape<>) that -Werror would fail on, so build
          # this docs-only target with USE_WERROR=OFF.
          # Route compiles through ccache (the ~/.ccache cache action above is
          # otherwise dead weight — without these launchers cmake never invokes
          # ccache, ~/.ccache stays empty, and every run is a cold ~64-min full
          # build).  With them, an incremental run only recompiles changed TUs.
          CXXFLAGS="-Wno-error=strict-overflow" cmake \
              -DCMAKE_BUILD_TYPE="RelWithDebInfo" \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DUSE_WERROR=OFF \
              -DUSE_ONEDNN=OFF \
              -DUSE_CUDA=OFF \
              -G Ninja ..
          # Only libmxnet is needed for the docs autodoc import; bare `ninja`
          # also builds tests/examples the linkcheck never uses.
          ninja mxnet
          cd ..
          ccache -s | grep -iE 'hits|misses' || true
        shell: bash

      - name: Setup Python
        run: |
          # Same reason as mx-theme above: mxnet's setup.py runs an op-signature
          # autocomplete that imports the (just-built) mxnet, which needs numpy at build
          # time. Build isolation would hide it, so build against the populated env.
          python -m pip install --no-build-isolation --user -e python

      - name: Link Check
        env:
          MAX_RETRY: 3
        run: |
          # `{1..$MAX_RETRY}` does not brace-expand with a variable (it ran once
          # over the literal string), and the cd lived inside the loop; do it once
          # and iterate with seq.
          cd docs/python_docs/python
          for run in $(seq 1 "$MAX_RETRY"); do
            make clean
            if timeout 10m make linkcheck EVAL=0; then
              exit 0
            fi
            echo "linkcheck attempt ${run}/${MAX_RETRY} failed"
          done
          exit 1
