name: link check

on: [push, pull_request]

defaults:
  run:
    shell: bash

jobs:
  linkcheck:
    # ubuntu-20.04 was retired by GitHub-hosted runners (2025), so this job sat
    # queued indefinitely. Bump to 22.04; this also requires dropping the gcc-7
    # toolchain (not packaged on 22.04) and the EOL Python 3.8 below.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # We include the commit sha in the cache key, as new cache entries are
          # only created if there is no existing entry for the key yet.
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          # Restore any ccache cache entry, if none for
          # ${{ runner.os }}-ccache-${{ github.sha }} exists
          restore-keys: |
            ${{ runner.os }}-ccache

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev ninja-build ccache python3-sphinx \
              pandoc libopencv-dev protobuf-compiler libprotobuf-dev
          ccache -M 500M  # Limit the ccache size; Github's overall cache limit is 5GB
          python -m pip install pandoc-attributes==0.1.7
          python -m pip install -r docs/python_docs/requirements
          python -m pip install docs/python_docs/themes/mx-theme
        shell: bash

      - name: Build project
        run: |
          git submodule update --init --recursive
          mkdir build; cd build
          CXXFLAGS="-Wno-error=strict-overflow" cmake \
              -DCMAKE_BUILD_TYPE="RelWithDebInfo" \
              -DUSE_ONEDNN=OFF \
              -DUSE_CUDA=OFF \
              -G Ninja ..
          ninja
          cd ..
        shell: bash

      - name: Setup Python
        run: |
          python -m pip install --user -e python

      - name: Link Check
        env:
          MAX_RETRY: 3
        run: |
          # `{1..$MAX_RETRY}` does not brace-expand with a variable (it ran once
          # over the literal string), and the cd lived inside the loop; do it once
          # and iterate with seq.
          cd docs/python_docs/python
          for run in $(seq 1 "$MAX_RETRY"); do
            make clean
            if timeout 10m make linkcheck EVAL=0; then
              exit 0
            fi
            echo "linkcheck attempt ${run}/${MAX_RETRY} failed"
          done
          exit 1
