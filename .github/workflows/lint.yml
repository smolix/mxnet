name: lint

on:
  # shellcheck/cmake-lint/ruff/clang-format only inspect code, build files and
  # scripts -- a docs-only or unrelated PR has nothing here to check, so scope the
  # triggers to the paths these jobs actually read. (master is unprotected; no
  # required-check is gated on this, so a skipped run can't block a merge.)
  push:
    branches: [master]
    paths:
      - 'python/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'tools/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'python/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'tools/**'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck (tools/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on tools/ scripts (warn-only)
        continue-on-error: true
        run: |
          set +e
          # tools/ contains many upstream-vintage scripts predating this
          # fork; the Blackwell port does not own them. Run shellcheck for
          # signal, but don't fail the workflow — fixes belong in their
          # own PR.
          mapfile -t scripts < <(find tools -type f -name '*.sh' | sort)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts under tools/"
            exit 0
          fi
          printf '%s\n' "${scripts[@]}"
          shellcheck -S error "${scripts[@]}" || true

  cmake-lint:
    name: cmake-format / cmake-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install cmakelang
        run: python -m pip install --upgrade pip cmakelang==0.6.13
      - name: cmake-lint (warn only)
        continue-on-error: true
        run: |
          set -e
          mapfile -t files < <(find . -name 'CMakeLists.txt' -not -path './3rdparty/*' -not -path './build*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CMakeLists.txt found"; exit 0
          fi
          printf '%s\n' "${files[@]}"
          cmake-lint "${files[@]}" || true
      - name: cmake-format --check (warn only)
        continue-on-error: true
        run: |
          set -e
          mapfile -t files < <(find . -name 'CMakeLists.txt' -not -path './3rdparty/*' -not -path './build*' | sort)
          cmake-format --check "${files[@]}" || true

  python-lint:
    name: ruff / flake8 / py_compile (python/mxnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Byte-compile Python sources (py_compile)
        # Folded in from the former o3-ci.yml: a hard gate that every source
        # under python/mxnet parses/compiles. ruff's E9 (below) catches the same
        # syntax errors, but py_compile is the authoritative "does CPython accept
        # it" check and covers the files ruff's E9 gate excludes, so we keep it.
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import py_compile
          import sys
          import tempfile

          roots = [Path("python/mxnet")]
          checked = 0
          failures = []

          with tempfile.TemporaryDirectory(prefix="mxnet-pycompile-") as tmp:
              tmpdir = Path(tmp)
              for root in roots:
                  for path in sorted(root.rglob("*.py")):
                      if "__pycache__" in path.parts:
                          continue
                      checked += 1
                      cfile = tmpdir / (str(path).replace("/", "__") + ".pyc")
                      try:
                          py_compile.compile(str(path), cfile=str(cfile), doraise=True)
                      except py_compile.PyCompileError as exc:
                          failures.append((path, exc.msg))

          print(f"checked {checked} Python files")
          for path, message in failures:
              print(f"::error file={path}::{message}")

          sys.exit(1 if failures else 0)
          PY
      - name: Install linters
        run: python -m pip install --upgrade pip ruff==0.6.9 flake8==7.1.1
      - name: ruff (errors only, warn on style)
        run: |
          # Fail only on real syntax errors (E9) and invalid type comparisons
          # (F63). Skip:
          #   - python/mxnet/cython/*.pyi: Cython-style extern declarations
          #     that look like Python type-stub files but aren't valid Python.
          #   - python/mxnet/container.py: FFI bindings populated at runtime,
          #     so F821 (undefined-name) fires falsely on _ADT / _GetADTTag.
          #   - python/mxnet/_ffi/_cython/: Cython glue, .pyx-adjacent.
          # F7 (syntax-ish warnings) and F82 (undefined name) are demoted to
          # warn-only by `--exit-zero` below.
          ruff check python/mxnet \
            --select E9,F63 \
            --exclude python/mxnet/cython \
            --exclude python/mxnet/_ffi/_cython \
            --exclude python/mxnet/container.py \
            --output-format=github
          ruff check python/mxnet --exit-zero --output-format=github || true
      - name: flake8 (warn only)
        continue-on-error: true
        run: flake8 --max-line-length=120 --count --statistics python/mxnet || true

  clang-format:
    name: clang-format check (warn only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14
      - name: Run clang-format --dry-run on DNNL operator sources
        run: |
          set +e
          dirs="src/operator/nn/dnnl src/operator/subgraph/dnnl src/operator/quantization/dnnl"
          found_any=0
          for d in $dirs; do
            if [ -d "$d" ]; then
              files=$(find "$d" -type f \( -name '*.cc' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' \))
              if [ -n "$files" ]; then
                found_any=1
                echo "::group::clang-format $d"
                # shellcheck disable=SC2086
                clang-format-14 --dry-run --Werror $files || true
                echo "::endgroup::"
              fi
            fi
          done
          [ "$found_any" = "1" ] || echo "No DNNL operator sources found"
          exit 0
