name: lint

on:
  push:
    branches: [master, onednn-v3-port]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck (tools/)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on tools/ scripts
        run: |
          set -e
          # Lint every *.sh under tools/, recursively. Warn-only on style;
          # fail only on real errors (-S error).
          mapfile -t scripts < <(find tools -type f -name '*.sh' | sort)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts under tools/"
            exit 0
          fi
          printf '%s\n' "${scripts[@]}"
          shellcheck -S error "${scripts[@]}"

  cmake-lint:
    name: cmake-format / cmake-lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cmakelang
        run: python -m pip install --upgrade pip cmakelang==0.6.13
      - name: cmake-lint (warn only)
        continue-on-error: true
        run: |
          set -e
          mapfile -t files < <(find . -name 'CMakeLists.txt' -not -path './3rdparty/*' -not -path './build*' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CMakeLists.txt found"; exit 0
          fi
          printf '%s\n' "${files[@]}"
          cmake-lint "${files[@]}" || true
      - name: cmake-format --check (warn only)
        continue-on-error: true
        run: |
          set -e
          mapfile -t files < <(find . -name 'CMakeLists.txt' -not -path './3rdparty/*' -not -path './build*' | sort)
          cmake-format --check "${files[@]}" || true

  python-lint:
    name: ruff / flake8 (python/mxnet)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: python -m pip install --upgrade pip ruff==0.6.9 flake8==7.1.1
      - name: ruff (errors only, warn on style)
        run: |
          # Show all findings, but only fail on syntax / undefined-name (E9, F63, F7, F82).
          ruff check python/mxnet --select E9,F63,F7,F82 --output-format=github
          ruff check python/mxnet --exit-zero --output-format=github || true
      - name: flake8 (warn only)
        continue-on-error: true
        run: flake8 --max-line-length=120 --count --statistics python/mxnet || true

  clang-format:
    name: clang-format check (warn only)
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14
      - name: Run clang-format --dry-run on DNNL operator sources
        run: |
          set +e
          dirs="src/operator/nn/dnnl src/operator/subgraph/dnnl src/operator/quantization/dnnl"
          found_any=0
          for d in $dirs; do
            if [ -d "$d" ]; then
              files=$(find "$d" -type f \( -name '*.cc' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' \))
              if [ -n "$files" ]; then
                found_any=1
                echo "::group::clang-format $d"
                # shellcheck disable=SC2086
                clang-format-14 --dry-run --Werror $files || true
                echo "::endgroup::"
              fi
            fi
          done
          [ "$found_any" = "1" ] || echo "No DNNL operator sources found"
          exit 0
