name: o3-ci

on:
  push:
    branches: [master, onednn-v3-port]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: o3-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-compile:
    name: Python compile (no native build)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python package sources
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import py_compile
          import sys
          import tempfile

          roots = [Path("python/mxnet")]
          checked = 0
          failures = []

          with tempfile.TemporaryDirectory(prefix="mxnet-pycompile-") as tmp:
              tmpdir = Path(tmp)
              for root in roots:
                  for path in sorted(root.rglob("*.py")):
                      if "__pycache__" in path.parts:
                          continue
                      checked += 1
                      cfile = tmpdir / (str(path).replace("/", "__") + ".pyc")
                      try:
                          py_compile.compile(str(path), cfile=str(cfile), doraise=True)
                      except py_compile.PyCompileError as exc:
                          failures.append((path, exc.msg))

          print(f"checked {checked} Python files")
          for path, message in failures:
              print(f"::error file={path}::{message}")

          sys.exit(1 if failures else 0)
          PY
