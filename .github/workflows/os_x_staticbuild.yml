name: continuous build

on:
  push:
    branches: [master, onednn-v3-port]
  pull_request:
    branches: [master, onednn-v3-port]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: continuous-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apple-silicon:
    name: Apple Silicon continuous build
    uses: ./.github/workflows/macos-arm64-cpu.yml
