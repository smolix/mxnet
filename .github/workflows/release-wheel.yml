name: release-wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the wheel to (e.g. v2.0.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build CPU wheel (oneDNN + OpenCV bundled) on ubuntu-22.04
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # libopencv-dev: the CPU wheel is now built with USE_OPENCV=ON and the
          # native libopencv_* closure is bundled into the wheel (parity with the
          # CUDA wheel) so image I/O works out of the box.
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            cmake \
            ccache \
            g++ \
            libopenblas-dev \
            libomp-dev \
            libopencv-dev \
            patchelf \
            python3-dev
          # tools/build_cleanup_wheel.sh runs `python -m build --no-isolation`, so
          # the build front-end AND setup.py's runtime imports (op-signature
          # autocomplete) must already be present in this interpreter.
          python -m pip install --upgrade pip wheel setuptools build Cython \
            "numpy<2" requests graphviz packaging scipy-openblas32

      - name: Resolve tag / version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$tag" ]; then
            tag="dev-${GITHUB_SHA::8}"
            version="0.0.0.dev0+g${GITHUB_SHA::8}"
          else
            # Strip leading "v" to form a PEP-440 version.
            version="${tag#v}"
          fi
          version="$(python -c 'from packaging.version import Version; import sys; print(Version(sys.argv[1]))' "$version")"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build CPU wheel (oneDNN + OpenCV bundled)
        env:
          # Drive the shared release tooling in its Linux CPU flavor so the CI
          # wheel is byte-for-byte the same recipe as a local
          #   MXNET_WHEEL_FLAVOR=cpu tools/build_cleanup_wheel.sh
          # configure -> build (build-cpu/) -> bundle OpenCV closure -> patch
          # RUNPATH -> build wheel -> release_provenance.py gate.
          PYTHON: python
          MXNET_WHEEL_FLAVOR: cpu
        run: |
          set -e
          MXNET_BUILD_JOBS="$(getconf _NPROCESSORS_ONLN)" \
            tools/build_cleanup_wheel.sh "${{ steps.ver.outputs.version }}"
          ls -lh dist/*.whl

      - name: Upload wheel as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: mxnet-cpu-wheel-${{ steps.ver.outputs.version }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30

      - name: Attach wheel to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/*.whl
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            CPU-only MXNet wheel — x86_64, oneDNN + OpenCV (native libs bundled),
            no CUDA. ONNX (`mxnet.onnx`) ships in the wheel; `onnx` itself is the
            optional `[onnx]` extra here (`pip install "mxnet[onnx]"`).

            GPU/CUDA wheels require a self-hosted CUDA runner and are not built by
            this workflow — see docs/cuda_wheel_build.md and
            tools/release_cuda_wheel.sh.
