name: release-wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the wheel to (e.g. v2.0.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build Linux x86_64 CPU wheel (oneDNN + OpenCV bundled)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          # Build the Linux CPU wheel as cp312, matching the published +cpu.linux
          # wheels and the docs-deploy lookup (which installs the cp312 wheel). The
          # clean-room import test below also runs on python:3.12-slim.
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update -o Acquire::Retries=3
          # libopencv-dev: the CPU wheel is now built with USE_OPENCV=ON and the
          # native libopencv_* closure is bundled into the wheel (parity with the
          # CUDA wheel) so image I/O works out of the box.
          # Retries + per-connection timeout so a slow mirror fails fast and retries.
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=25 -o Acquire::https::Timeout=25 \
            build-essential \
            ninja-build \
            cmake \
            ccache \
            g++ \
            gfortran \
            libopenblas-dev \
            libomp-dev \
            libopencv-dev \
            patchelf \
            python3-dev
          # tools/build_cleanup_wheel.sh runs `python -m build --no-isolation`, so
          # the build front-end AND setup.py's runtime imports (op-signature
          # autocomplete) must already be present in this interpreter.
          python -m pip install --upgrade pip wheel setuptools build Cython \
            "numpy<2" requests graphviz packaging scipy-openblas32

      - name: Resolve tag / version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$tag" ]; then
            tag="dev-${GITHUB_SHA::8}"
            version="0.0.0.dev0+g${GITHUB_SHA::8}"
          else
            # Strip leading "v" to form a PEP-440 version.
            version="${tag#v}"
          fi
          version="$(python -c 'from packaging.version import Version; import sys; print(Version(sys.argv[1]))' "$version")"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build CPU wheel (oneDNN + OpenCV bundled)
        env:
          # Drive the shared release tooling in its Linux CPU flavor so the CI
          # wheel is byte-for-byte the same recipe as a local
          #   MXNET_WHEEL_FLAVOR=cpu tools/build_cleanup_wheel.sh
          # configure -> build (build-cpu/) -> bundle OpenCV closure -> patch
          # RUNPATH -> build wheel -> release_provenance.py gate.
          PYTHON: python
          MXNET_WHEEL_FLAVOR: cpu
        run: |
          set -e
          MXNET_BUILD_JOBS="$(getconf _NPROCESSORS_ONLN)" \
            tools/build_cleanup_wheel.sh "${{ steps.ver.outputs.version }}"
          ls -lh dist/*.whl

      - name: Verify the wheel is self-contained (clean-room import)
        run: |
          set -e
          # The build host has libopencv-dev installed, so importing here would
          # resolve the bundled OpenCV's system deps from the host and hide any gap
          # in the vendored closure (this is exactly how the libcharls.so.2 miss went
          # unnoticed). Import instead in a minimal container that has NO OpenCV and
          # only the single host lib the Linux wheel is designed to borrow — libgomp1,
          # the GCC OpenMP runtime. If the bundled closure is incomplete, `import
          # mxnet` fails here, catching the regression before the wheel ships.
          docker run --rm -v "$PWD/dist:/dist:ro" python:3.12-slim bash -euxc '
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends libgomp1 >/dev/null
            pip install --quiet /dist/*.whl
            python -c "import mxnet, mxnet.runtime as rt; print(mxnet.__version__); print(rt.Features())"
          '

      - name: Upload wheel as workflow artefact
        uses: actions/upload-artifact@v7
        with:
          name: mxnet-cpu-wheel-${{ steps.ver.outputs.version }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30

      - name: Attach wheel to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/*.whl
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            CPU-only MXNet wheel — x86_64, oneDNN + OpenCV (native libs bundled),
            no CUDA. ONNX (`mxnet.onnx`) ships in the wheel; `onnx` itself is the
            optional `[onnx]` extra here (`pip install "mxnet[onnx]"`).

            GPU/CUDA wheels require a self-hosted CUDA runner and are not built by
            this workflow — see docs/cuda_wheel_build.md and
            tools/release_cuda_wheel.sh.

  build-macos-wheel:
    name: Build macOS arm64 CPU wheel (oneDNN + OpenCV + OpenMP bundled)
    # macos-15 is a native Apple-silicon (arm64) runner; matches macos-arm64-cpu.yml.
    runs-on: macos-15
    # Cold libmxnet build (~90 min) + the hermetic libomp build + the OpenCV
    # closure bundling + the provenance gate; generous headroom.
    timeout-minutes: 150
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          # The macOS wheel is built cp312 (matches the local build / full-test
          # tooling, which uses python3.12).
          python-version: "3.12"

      - name: Verify native arm64 runner
        run: |
          set -e
          test "$(uname -m)" = arm64 || { echo "expected an arm64 runner, got $(uname -m)" >&2; exit 1; }
          sw_vers

      - name: Install build dependencies (Homebrew)
        run: |
          # cmake + ninja for the build; opencv so USE_OPENCV=ON can discover it.
          # libomp is intentionally NOT installed: build_cleanup_wheel.sh builds a
          # hermetic libomp (tools/dependencies/build_openmp.py) and bundles it into
          # the wheel for self-containment — there is no system libomp to fall back
          # on, unlike Linux's libgomp.
          # The runner image preinstalls untrusted taps (aws/tap, azure/bicep) that
          # make `brew install` warn ("taps are not trusted"); untap them first.
          brew untap aws/tap azure/bicep 2>/dev/null || true
          brew install cmake ninja opencv

      - name: Build macOS arm64 CPU wheel (oneDNN + OpenCV + OpenMP bundled)
        env:
          # build_cleanup_wheel.sh reads $PYTHON for its interpreter and $OpenCV_DIR
          # to locate OpenCV (it defaults to the MacPorts path; this runner uses
          # Homebrew). The flavor auto-detects to `macos` from `uname -s`.
          PYTHON: python
        run: |
          set -e
          # PEP 517 build front-end + setup.py's autocomplete imports must be present
          # in this interpreter (the script runs `python -m build --no-isolation`).
          python -m pip install --upgrade pip wheel setuptools build Cython \
            "numpy<2" requests graphviz packaging
          export OpenCV_DIR="$(brew --prefix opencv)/lib/cmake/opencv4"
          echo "OpenCV_DIR=$OpenCV_DIR"
          # No explicit version: the script's per-flavor default (2.0.0+cpu.macos.DATE)
          # encodes the flavor and matches the published macOS wheel naming. The build
          # configures the macOS arm64 CPU feature set, bundles the OpenCV closure +
          # hermetic libomp, and runs the release_provenance.py gate (fails on any
          # feature/payload mismatch).
          MXNET_BUILD_JOBS=3 tools/build_cleanup_wheel.sh
          ls -lh dist/*.whl

      - name: Smoke test the wheel (fresh venv, import + features)
        run: |
          set -e
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install --upgrade pip
          /tmp/wheeltest/bin/pip install dist/*.whl
          /tmp/wheeltest/bin/python - <<'PY'
          import mxnet, mxnet.runtime as rt
          print("mxnet", mxnet.__version__, "from", mxnet.__file__)
          feats = rt.Features()
          assert feats.is_enabled("OPENCV"), "OPENCV feature is OFF in the macOS wheel"
          print("features OK:", feats)
          PY

      # NOTE: this job deliberately does NOT attach the macOS wheel to the GitHub
      # Release. A smoke test (import + OPENCV feature) is not sufficient gating to
      # ship a wheel; the macOS wheel must pass the full unit-test suite first. That
      # run happens out of band (locally on an Apple-silicon host), after which the
      # vetted wheel is attached to the release by hand. CI here only builds +
      # smoke-tests as a build-health check and publishes the wheel as a workflow
      # artefact (below) for download — it is never auto-released. See OI-32.
      - name: Upload wheel as workflow artefact
        uses: actions/upload-artifact@v7
        with:
          name: mxnet-macos-arm64-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30
