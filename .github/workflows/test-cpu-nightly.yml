name: test-cpu-nightly

on:
  workflow_dispatch:
  schedule:
    # Nightly at 07:00 UTC.
    - cron: "0 7 * * *"

permissions:
  contents: read
  # The gate job lists this workflow's prior runs (REST:
  # /repos/{owner}/{repo}/actions/workflows/{id}/runs) to find the last successful
  # nightly's commit; that read requires actions: read.
  actions: read

concurrency:
  group: test-cpu-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Decide whether the expensive build+sweep needs to run at all. The nightly
  # rebuilds libmxnet and runs a ~45-min pytest sweep; on a day with NO new commits,
  # master HEAD is identical to the commit the last nightly already tested green, so
  # the whole job is wasted compute. This job compares the current commit to the head
  # commit of the most recent SUCCESSFUL nightly and skips the sweep when they match.
  # Manual (workflow_dispatch) runs always proceed, so the sweep can be forced on
  # demand regardless of whether code changed.
  gate:
    name: Gate (skip if unchanged since last green nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Decide whether HEAD changed since the last successful nightly
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          CURRENT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Manual runs always execute the full sweep (forced / on-demand validation).
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Manual workflow_dispatch -> running the full sweep unconditionally."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Forced run (workflow_dispatch)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Head commit of the most recent SUCCESSFUL nightly on this branch. The
          # in-progress current run is not 'success' yet, so it is never matched here.
          last_sha=$(gh run list \
                       --repo "$REPO" \
                       --workflow test-cpu-nightly.yml \
                       --branch "$BRANCH" \
                       --status success \
                       --limit 1 \
                       --json headSha \
                       --jq '.[0].headSha // ""')
          echo "current HEAD ($BRANCH): $CURRENT_SHA"
          echo "last green nightly:    ${last_sha:-<none>}"
          if [ -z "$last_sha" ]; then
            decision=true;  reason="No prior successful nightly found"
          elif [ "$last_sha" = "$CURRENT_SHA" ]; then
            decision=false; reason="HEAD unchanged since the last successful nightly"
          else
            decision=true;  reason="HEAD changed since the last successful nightly"
          fi
          echo "should_run=$decision" >> "$GITHUB_OUTPUT"
          echo "$reason -> should_run=$decision" | tee -a "$GITHUB_STEP_SUMMARY"

  test:
    name: CPU pytest sweep (operator, gluon, dnnl)
    needs: gate
    # Skip the build+sweep entirely when the gate found nothing changed. A skipped
    # job leaves the overall run green, so an unchanged nightly finishes in seconds.
    if: ${{ needs.gate.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    # Cold build (~70 min at -j4) + deps install + 30-min pytest sweep, with
    # headroom. Nightly normally restores the build-cpu master cache (see the
    # cmake-build-cpu-/ccache-build-cpu- restore-keys) and builds warm in
    # minutes; this cap only matters if it ever runs genuinely cold.
    timeout-minutes: 180
    env:
      CMAKE_BUILD_DIR: build
      CMAKE_BUILD_TYPE: Release
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # 5G: the full CPU object set exceeds 2G, so a 2G cap thrashed within a
      # single cold build. Matches build-cpu.yml.
      CCACHE_MAXSIZE: "5G"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build + test dependencies
        run: |
          sudo apt-get update -o Acquire::Retries=3
          # gfortran provides libgfortran.so (libmxnet links it via OpenBLAS/LAPACK);
          # the runner image no longer ships the unversioned .so by default.
          # Retries + per-connection timeout so a slow mirror fails fast and retries.
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=25 -o Acquire::https::Timeout=25 \
            build-essential \
            ninja-build \
            cmake \
            ccache \
            g++ \
            gfortran \
            libopenblas-dev \
            libopencv-dev \
            libomp-dev \
            python3 \
            python3-pip \
            python3-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          # Image-scoped (ubuntu24): the build dir / ccache bake the absolute gcc
          # path, so caches from a different gcc major must not be restored.
          key: ccache-test-cpu-ubuntu24-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-test-cpu-ubuntu24-${{ github.ref }}-
            ccache-test-cpu-ubuntu24-
            ccache-build-cpu-ubuntu24-

      - name: Cache CMake build dir
        uses: actions/cache@v5
        with:
          path: ${{ env.CMAKE_BUILD_DIR }}
          key: cmake-test-cpu-ubuntu24-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            cmake-test-cpu-ubuntu24-${{ github.ref }}-
            cmake-test-cpu-ubuntu24-
            cmake-build-cpu-ubuntu24-

      - name: Configure CMake
        run: |
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUSE_CUDA=OFF \
            -DUSE_CUDNN=OFF \
            -DUSE_NCCL=OFF \
            -DUSE_ONEDNN=ON \
            -DUSE_OPENMP=ON \
            -DUSE_OPERATOR_TUNING=OFF \
            -DUSE_OPENCV=ON \
            -DUSE_BLAS=open \
            -DUSE_DIST_KVSTORE=OFF \
            -DBUILD_CPP_EXAMPLES=OFF

      - name: Build (ninja mxnet)
        # 120-min cap: a cold build at -j4 (= nproc on the standard
        # ubuntu-22.04 runner) takes ~70 min. The old 60-min cap killed cold
        # builds before they finished, so the Post Cache steps never ran and
        # the cache never seeded -> every nightly started cold and timed out
        # again. Warm builds (cache restored) finish in minutes.
        timeout-minutes: 120
        run: cmake --build "$CMAKE_BUILD_DIR" --target mxnet -- -j"$(nproc)"

      - name: Install python package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<2" requests scipy pytest pytest-timeout pytest-xdist pytest-rerunfailures
          cd python && python -m pip install -e . && cd ..

      - name: Run pytest sweep (per-target, memory-bounded)
        # Each target runs in its OWN pytest process so module state and accumulated
        # NDArray memory are released between targets. The previous single-process
        # sweep over test_operator.py + test_gluon.py + dnnl peaked past the runner's
        # RAM and was OOM-killed mid-run (the job showed "canceled" with no report
        # uploaded). Per-target reports are uploaded unconditionally, so if a single
        # target still exceeds RAM the next run pinpoints which one (candidate
        # follow-up: run that target with pytest-forked's --forked).
        # Per-test 300s timeout; flaky tests auto-retry twice.
        timeout-minutes: 45
        env:
          MXNET_ENGINE_TYPE: NaiveEngine
          OMP_NUM_THREADS: "2"
        run: |
          set -uo pipefail
          mkdir -p test-reports
          targets=(
            "operator:tests/python/unittest/test_operator.py"
            "gluon:tests/python/unittest/test_gluon.py"
            "dnnl:tests/python/dnnl"
          )
          rc=0
          for entry in "${targets[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            echo "::group::pytest ${name} (${path})"
            pytest \
              --timeout=300 \
              --reruns=2 --reruns-delay=5 \
              --junitxml="test-reports/${name}.xml" \
              -ra -v \
              "${path}" 2>&1 | tee "test-reports/${name}.log" || rc=1
            echo "::endgroup::"
          done
          exit "${rc}"

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report-cpu-${{ github.sha }}
          path: |
            test-reports/*.xml
            test-reports/*.log
          if-no-files-found: warn
          retention-days: 30
