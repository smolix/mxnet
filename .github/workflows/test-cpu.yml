name: test-cpu

on:
  push:
    branches: [master, onednn-v3-port]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-cpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: CPU pytest (oneDNN subset, <20 min)
    runs-on: ubuntu-22.04
    # Artifact download + pip install + test run.  All chosen tests are
    # CPU-only and have a 180 s per-test timeout; the full suite finishes
    # well under 20 min on a 4-core runner when the build artifact is
    # already present.
    timeout-minutes: 20
    env:
      VENV_DIR: ${{ github.workspace }}/.venv
      PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false   # Tests only; no need to pull 3rd-party source

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------ #
      # pip wheel cache — keyed on Python version + requirements hash so   #
      # that a requirements change always busts it.                         #
      # ------------------------------------------------------------------ #
      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: pip-test-cpu-py311-${{ hashFiles('python/mxnet/requirements*.txt', 'tests/requirements*.txt') }}
          restore-keys: |
            pip-test-cpu-py311-
            pip-test-cpu-

      # ------------------------------------------------------------------ #
      # Download the libmxnet.so produced by build-cpu.yml on the same SHA #
      # ------------------------------------------------------------------ #
      - name: Download libmxnet.so artifact
        uses: actions/download-artifact@v4
        with:
          name: libmxnet-cpu-${{ github.sha }}
          path: ${{ github.workspace }}/lib

      - name: Locate libmxnet.so
        id: locate
        run: |
          set -e
          libpath=$(find "$GITHUB_WORKSPACE/lib" -name 'libmxnet.so' | head -n1)
          if [ -z "$libpath" ]; then
            echo "libmxnet.so not found in artifact" >&2
            exit 1
          fi
          echo "libpath=$libpath" >> "$GITHUB_OUTPUT"
          ls -lh "$libpath"

      # ------------------------------------------------------------------ #
      # Create venv and install runtime deps                                #
      # Note: nvidia-cudnn-cu13 / nvidia-nccl-cu13 ship their shared libs  #
      # as pure-Python wheels; installing them ensures the .so chain is     #
      # present even on CPU runners (MXNet dlopen-loads them lazily).       #
      # ------------------------------------------------------------------ #
      - name: Create venv and install dependencies
        run: |
          python -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --cache-dir "$PIP_CACHE_DIR"
          pip install --cache-dir "$PIP_CACHE_DIR" \
            "numpy<2" \
            requests \
            pytest \
            pytest-timeout \
            nvidia-cudnn-cu13 \
            nvidia-nccl-cu13

      - name: Install in-tree MXNet Python package
        env:
          MXNET_LIBRARY_PATH: ${{ steps.locate.outputs.libpath }}
        run: |
          source "$VENV_DIR/bin/activate"
          cd python
          pip install --cache-dir "$PIP_CACHE_DIR" -e .
          cd ..
          python -c "import mxnet; print('mxnet import OK, version:', mxnet.__version__)"

      # ------------------------------------------------------------------ #
      # Run the fast CPU-capable subset                                     #
      #   * tests/python/dnnl/test_dnnl.py          — oneDNN op smoke      #
      #   * tests/python/dnnl/subgraphs/             — FC subgraph fusion   #
      #   * tests/python/unittest/test_engine_*      — scheduler lifecycle  #
      #   * tests/python/unittest/test_inplace_dtype — dtype/inplace logic  #
      # Per-test timeout 180 s; total well within the 20-min job cap.       #
      # ------------------------------------------------------------------ #
      - name: Run pytest subset
        env:
          MXNET_LIBRARY_PATH: ${{ steps.locate.outputs.libpath }}
          MXNET_ENGINE_TYPE: NaiveEngine
        run: |
          source "$VENV_DIR/bin/activate"
          pytest \
            tests/python/dnnl/test_dnnl.py \
            tests/python/dnnl/subgraphs/test_fc_subgraph.py \
            tests/python/unittest/test_engine_shutdown.py \
            tests/python/unittest/test_inplace_dtype.py \
            -v --timeout=180 --tb=short

      - name: Upload pytest report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ github.sha }}
          path: |
            .pytest_cache/
          if-no-files-found: ignore
          retention-days: 7
