name: test-cpu

# Triggered after build-cpu completes (on the same branch/SHA) so the
# libmxnet-cpu artifact is guaranteed to exist before we try to download it.
# workflow_run gives us both the completed status guard and the run_id of
# the producer workflow — needed for cross-workflow artifact download.
on:
  workflow_run:
    workflows: ["build-cpu"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read   # needed to download artifacts from a different workflow run

concurrency:
  group: test-cpu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: CPU pytest (oneDNN subset, <20 min)
    # Only run when the triggering build-cpu run succeeded.
    # For workflow_dispatch there is no github.event.workflow_run, so we
    # use a conditional that passes through on manual triggers.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Artifact download + uv install + test run.  All chosen tests are
    # CPU-only and have a 180 s per-test timeout; the full suite finishes
    # well under 20 min on a 4-core runner when the build artifact is
    # already present.
    timeout-minutes: 20
    env:
      VENV_DIR: ${{ github.workspace }}/.venv
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

    steps:
      - uses: actions/checkout@v5
        with:
          # For workflow_run events the SHA we want to test is the one that
          # triggered the upstream build, not the merge commit.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          submodules: false   # Tests only; no need to pull 3rd-party source

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # build-cpu builds libmxnet.so with USE_OPENCV=ON, so the downloaded
      # artifact has a runtime NEEDED dependency on libopencv_*.so. This is a
      # fresh runner (it only installs uv + Python deps), so without the OpenCV
      # runtime present `import mxnet` fails to dlopen libmxnet.so. Install the
      # same OpenCV packages build-cpu uses so the SONAMEs match.
      - name: Install OpenCV runtime (libmxnet.so links against it)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopencv-dev

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      # ------------------------------------------------------------------ #
      # uv cache — keyed on Python version + requirements hash so          #
      # that a requirements change always busts it.                         #
      # ------------------------------------------------------------------ #
      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-test-cpu-py311-${{ hashFiles('python/setup.py', 'tests/requirements*.txt') }}
          restore-keys: |
            uv-test-cpu-py311-
            uv-test-cpu-

      # ------------------------------------------------------------------ #
      # Download the libmxnet.so produced by build-cpu.yml on the same SHA.#
      # For workflow_run events we must reference the producer run's ID;   #
      # for workflow_dispatch we fall back to same-run (build won't have   #
      # run so the tester must supply the artifact manually or skip).       #
      # ------------------------------------------------------------------ #
      - name: Download libmxnet.so artifact
        uses: actions/download-artifact@v8
        with:
          name: libmxnet-cpu-${{ github.event.workflow_run.head_sha || github.sha }}
          path: ${{ github.workspace }}/lib
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate libmxnet.so
        id: locate
        run: |
          set -e
          libpath=$(find "$GITHUB_WORKSPACE/lib" -name 'libmxnet.so' | head -n1)
          if [ -z "$libpath" ]; then
            echo "libmxnet.so not found in artifact" >&2
            exit 1
          fi
          echo "libpath=$libpath" >> "$GITHUB_OUTPUT"
          ls -lh "$libpath"

      # ------------------------------------------------------------------ #
      # Create venv and install runtime deps                                #
      # Use uv for the Python environment, matching the Linux build smoke.  #
      # ------------------------------------------------------------------ #
      - name: Create venv and install dependencies
        run: |
          uv venv "$VENV_DIR" --python 3.11
          uv pip install --python "$VENV_DIR/bin/python" \
            "numpy<2" \
            requests \
            pytest \
            pytest-timeout

      - name: Install in-tree MXNet Python package
        env:
          MXNET_LIBRARY_PATH: ${{ steps.locate.outputs.libpath }}
          MXNET_SETUP_ENABLE_CUDA_DEPS: "0"
        run: |
          cd python
          uv pip install --python "$VENV_DIR/bin/python" -e .
          cd ..
          "$VENV_DIR/bin/python" -c "import mxnet; print('mxnet import OK, version:', mxnet.__version__)"

      # ------------------------------------------------------------------ #
      # Run the fast CPU-capable subset                                     #
      #   * tests/python/dnnl/test_dnnl.py          — oneDNN op smoke      #
      #   * tests/python/dnnl/subgraphs/             — FC subgraph fusion   #
      #   * tests/python/unittest/test_engine_*      — scheduler lifecycle  #
      #   * tests/python/unittest/test_inplace_dtype — dtype/inplace logic  #
      #   * test_operator.py::test_custom_op_*_exception_isolation_*        #
      #       — engine exception isolation under NaiveEngine. These two run #
      #         ONLY in the nightly sweep otherwise, so a NaiveEngine       #
      #         regression here goes unseen on PRs for a day; pull them     #
      #         into the fast subset so PR CI guards them directly.         #
      # Per-test timeout 180 s; total well within the 20-min job cap.       #
      # ------------------------------------------------------------------ #
      - name: Run pytest subset
        env:
          MXNET_LIBRARY_PATH: ${{ steps.locate.outputs.libpath }}
          MXNET_ENGINE_TYPE: NaiveEngine
        run: |
          "$VENV_DIR/bin/python" -m pytest \
            tests/python/dnnl/test_dnnl.py \
            tests/python/dnnl/subgraphs/test_fc_subgraph.py \
            tests/python/unittest/test_engine_shutdown.py \
            tests/python/unittest/test_inplace_dtype.py \
            "tests/python/unittest/test_operator.py::test_custom_op_exception_isolation_between_queued_ops" \
            "tests/python/unittest/test_operator.py::test_custom_op_backward_exception_isolation_between_queued_ops" \
            -v --timeout=180 --tb=short

      - name: Upload pytest report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report-${{ github.event.workflow_run.head_sha || github.sha }}
          path: |
            .pytest_cache/
          if-no-files-found: ignore
          retention-days: 7
