    - 'include/mshadow' # symlink to 3rdparty/mshadow/mshadow
    - 'include/onednn' # symlinks to 3rdparty/onednn
    - 'include/nnvm' # symlinks to 3rdparty/tvm/nnvm/include/nnvm
