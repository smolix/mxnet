    - 'tests/python/dnnl/data/test_dnnl_test_dnnl_model_model1.json'
    - 'tools/dependencies/download_checksums.json'
    # Blackwell-port fork-local docs we maintain ourselves (no ASF header).
    # The per-topic engineering notes were consolidated into FIXED.md /
    # OPEN_ISSUES.md (+ details) and removed; see git history for the originals.
    - 'BUILDING.md'
    - 'CHANGELOG.md'
    - 'FIXED.md'
    - 'OPEN_ISSUES.md'
    - 'OPEN_ISSUES_DETAILS.md'
    # Remaining fork-local status notes (not yet consolidated).
    - 'cudnn_autotune_v9.md'
    - 'nccl_status.md'
    - 'quantized_backward_status.md'
    - 'fp16_perf_bench.md'
    - 'sparse_thrust3_bench.md'
    - 'storage_pool_bench.md'
    - 'd2l-ssd-bug.md'
    # Blackwell-port fork-local benchmark / reproducer scripts
    # (kept in tree for future re-running; not shipped in the wheel).
    - 'bench_tf32_conv.py'
    - 'bench_cudnn_sweep.py'
    - 'bench_cublaslt.py'
    - 'bench_cublaslt_dtypes.py'
    - 'repro_batch_dot_fp16.py'
    - 'bench_cpu_inference_b8.py'
    - 'bench_fp16_mxnet.py'
    - 'bench_fp16_mxnet_vs_pytorch.py'
    - 'bench_fp16_pytorch.py'
    - 'bench_gpu_storage_pool.py'
    - 'bench_sparse_thrust3.py'
    - 'perf_scan.py'
    # Investigations directory (patches, repros, notes — not shipped).
    - '.investigations/**'
    - 'd2l-issues/**'
    - 'd2l-diagnostics/**'
    # Fork-local regression tests (GPU pool / dtype tests added during port).
    - 'tests/python/gpu/test_b7_multithread_pool.py'
    - 'tests/python/gpu/test_pool_dynamic_shape.py'
    - 'tests/python/unittest/test_inplace_dtype.py'
    # local cuDNN install dir (downloaded wheel, not source)
    - 'cudnn_local'
    # build artifacts
    - 'build*'
    - 'gpu_memory_profile-*.csv'


  comment: on-failure
