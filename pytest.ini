[pytest]
# Exclude non-test trees. In particular tools/pip/sanity_test.py executes
# mxnet code at module top level and crashes collection on GPU-default
# contexts. 3rdparty contains TVM/onednn upstream tests we don't want.
# We do NOT set testpaths here — explicit cli paths must be honored, and
# xdist gw workers diverge if pytest re-walks testpaths.
norecursedirs = tools 3rdparty build .venv tutorials example nightly docs cpp-package contrib amalgamation docker docker-python julia perl-package R-package scala-package .*

markers =
    seed: set the python, numpy and mxnet random seeds to a specified value for test reproducibility
    serial: mark a test that requires more resources to run that are thus only suitable for serial run.
    remote_required: mark a test that requires internet access.
    gpu: mark a test that requires GPU.
    integration: mark an integration test
    onnx_coverage: ONNX coverage test
    garbage_expected: this test leaks ndarray references. The tested functionality is broken or there is a Python bug.
    flaky: mark a test as known flaky for pytest-rerunfailures when that plugin is installed.

env =
    MXNET_HOME=tests/data

timeout = 1200
faulthandler_timeout = 1200
